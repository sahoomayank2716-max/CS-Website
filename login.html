<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Department Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
            position: relative;
        }

        /* Dark transparent overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
        }

        /* Main container */
        .login-container {
            position: relative;
            width: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            color: #fff;
        }

        /* Title */
        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #00d9ff;
        }

        /* Input fields */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .input-group input::placeholder {
            color: #ccc;
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 10px;
            background: #00d9ff;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #00bcd4;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h2>Admin Login</h2>

    <form id="adminForm">
        <div class="input-group">
            <input type="text" placeholder="Admin Username" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Login as Admin</button>
    </form>

    <div class="footer-text">
        Computer Science Department Portal
    </div>

</div>
<script>
document.getElementById("adminForm").addEventListener("submit", function(e) {
    e.preventDefault();
    window.location.href = "admin.html";
});
</script>
</body>
</html>
