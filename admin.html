<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS HUB Admin Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Sidebar */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #0d47a1;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    margin: 10px 0;
    text-decoration: none;
    cursor: pointer;
}

.sidebar a:hover {
    background: #1565c0;
}

/* Main */
.main {
    margin-left: 250px;
    padding: 20px;
}

/* Sections */
.section {
    display: none;
}

.active {
    display: block;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: #2196f3;
    color: white;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
}

/* Forms */
form input, form select, form textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
}

button {
    padding: 10px;
    background: #0d47a1;
    color: white;
    border: none;
}
</style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>CS HUB</h2>
    <a onclick="showSection('dashboard')">Dashboard</a>
    <a onclick="showSection('notes')">Upload Notes</a>
    <a onclick="showSection('pyq')">Upload PYQ</a>
    <a onclick="showSection('syllabus')">Upload Syllabus</a>
    <a onclick="showSection('notices')">Notices</a>
</div>

<!-- Main -->
<div class="main">

<!-- Dashboard -->
<div id="dashboard" class="section active">
    <h1>Dashboard</h1>
    <div class="cards">
        <div class="card">Notes: 120</div>
        <div class="card">PYQ: 80</div>
        <div class="card">Syllabus: 20</div>
        <div class="card">Downloads: 500</div>
    </div>
</div>

<!-- Upload Notes -->
<div id="notes" class="section">
    <h2>Upload Notes</h2>
    <form>
        <select>
            <option>BCA</option>
            <option>M.Sc CS</option>
        </select>

        <select>
            <option>Semester 1</option>
            <option>Semester 2</option>
        </select>

        <input type="text" placeholder="Subject">
        <input type="text" placeholder="Title">
        <textarea placeholder="Description"></textarea>
        <input type="file">

        <button>Upload</button>
    </form>
</div>

<!-- Upload PYQ -->
<div id="pyq" class="section">
    <h2>Upload PYQ</h2>
    <form>
        <input type="text" placeholder="Course">
        <input type="text" placeholder="Semester">
        <input type="text" placeholder="Subject">
        <input type="text" placeholder="Year">
        <input type="file">
        <button>Upload</button>
    </form>
</div>

<!-- Upload Syllabus -->
<div id="syllabus" class="section">
    <h2>Upload Syllabus</h2>
    <form>
        <input type="text" placeholder="Course">
        <input type="text" placeholder="Semester">
        <input type="file">
        <button>Upload</button>
    </form>
</div>

<!-- Notices -->
<div id="notices" class="section">
    <h2>Post Notice</h2>
    <form>
        <input type="text" placeholder="Title">
        <textarea placeholder="Notice Description"></textarea>
        <button>Post</button>
    </form>
</div>

</div>

<!-- JS -->
<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
